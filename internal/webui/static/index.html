<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brainiac</title>
  <style>
    :root { --bg:#0f1115; --panel:#171a21; --fg:#e6e6e6; --muted:#8a90a2; --accent:#5b9dff; --line:#242833; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:16px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; }
    header h1 { font-size:18px; margin:0; }
    header .tabs { display:flex; gap:4px; }
    .tab { padding:6px 12px; border-radius:6px; cursor:pointer; color:var(--muted); }
    .tab.active { background:var(--panel); color:var(--fg); }
    main { padding:20px; max-width:900px; margin:0 auto; }
    .row { display:flex; gap:8px; margin-bottom:16px; }
    input[type=text] { flex:1; padding:10px 12px; background:var(--panel); border:1px solid var(--line); border-radius:6px; color:var(--fg); }
    button { padding:10px 16px; background:var(--accent); color:#06101f; border:0; border-radius:6px; font-weight:600; cursor:pointer; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px 14px; margin-bottom:10px; }
    .meta { color:var(--muted); font-size:12px; margin-bottom:4px; }
    .dist { color:var(--accent); font-variant-numeric:tabular-nums; }
    .scope { border:1px solid var(--line); border-radius:4px; padding:0 5px; font-size:11px; }
    .scope.project { color:var(--accent); border-color:var(--accent); }
    .fallback { color:#e0b341; background:var(--panel); border:1px solid #e0b341; border-radius:8px; padding:8px 12px; margin-bottom:10px; font-size:13px; }
    .help { color:var(--muted); font-size:12px; margin:-4px 0 8px; }
    header .auth { display:flex; gap:6px; align-items:center; margin-top:8px; }
    header .auth input { flex:0 1 320px; }
    header .auth.hidden { display:none; }
    .logs-box { background:#0d0f14; border:1px solid var(--line); border-radius:8px; max-height:60vh; overflow:auto; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
    .logline { display:flex; gap:8px; padding:1px 8px; white-space:pre-wrap; word-break:break-word; }
    .logline:hover { background:#161922; }
    .logline .ln { color:var(--muted); user-select:none; text-align:right; min-width:3ch; }
    .logline .lc { color:var(--accent); opacity:0; cursor:pointer; user-select:none; }
    .logline:hover .lc { opacity:.8; }
    .edge { padding:4px 0; border-bottom:1px solid var(--line); }
    .edge:last-child { border-bottom:0; }
    .name { color:var(--accent); }
    table { width:100%; border-collapse:collapse; }
    td { padding:6px 8px; border-bottom:1px solid var(--line); }
    td:first-child { color:var(--muted); }
    .hidden { display:none; }
    .empty { color:var(--muted); padding:8px 0; }
    a { color:var(--accent); }
    h3 { margin:16px 0 8px; font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    .pill { display:inline-block; padding:3px 10px; border-radius:999px; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
    .pill.ok { background:#12351f; color:#5fd08a; }
    .pill.warn { background:#3a2f10; color:#e6b64c; }
    .pill.critical { background:#3a1518; color:#ff6b6b; }
    .warns { margin:10px 0 0; padding:0; list-style:none; }
    .warns li { padding:4px 0; color:#e6b64c; }
    .bar { height:6px; background:var(--line); border-radius:3px; overflow:hidden; margin-top:4px; }
    .bar > span { display:block; height:100%; background:var(--accent); }
    .bar.warn > span { background:#e6b64c; } .bar.crit > span { background:#ff6b6b; }
    td:last-child { text-align:right; font-variant-numeric:tabular-nums; }
  </style>
</head>
<body>
  <header>
    <h1>🧠 Brainiac</h1>
    <div class="tabs">
      <div class="tab active" data-tab="search">Search</div>
      <div class="tab" data-tab="recall">Recall</div>
      <div class="tab" data-tab="consolidate">Consolidate</div>
      <div class="tab" data-tab="proposals">Proposals</div>
      <div class="tab" data-tab="graph">Graph</div>
      <div class="tab" data-tab="health">Health</div>
      <div class="tab" data-tab="system">System</div>
      <div class="tab" data-tab="logs">Logs</div>
    </div>
    <div class="auth" id="auth-bar">
      <input type="password" id="auth-token" placeholder="AUTH_TOKEN (for write actions)" autocomplete="off" />
      <button onclick="saveToken()">Save</button>
      <span id="auth-status" class="help" style="margin:0"></span>
    </div>
  </header>

  <main>
    <section id="search">
      <div class="row">
        <input type="text" id="search-q" placeholder="Semantic search…" />
        <button onclick="doSearch()">Search</button>
      </div>
      <div id="search-results"></div>
    </section>

    <section id="recall" class="hidden">
      <div class="row">
        <input type="text" id="recall-q" placeholder="Why / how does … work?" />
        <button onclick="doRecall()">Recall</button>
      </div>
      <div id="recall-results"></div>
    </section>

    <section id="consolidate" class="hidden">
      <div class="row"><button onclick="doConsolidate()">Refresh</button></div>
      <div id="consolidate-results"></div>
    </section>

    <section id="proposals" class="hidden">
      <div class="row"><button onclick="doProposals()">Refresh</button></div>
      <div id="proposals-results"></div>
    </section>

    <section id="graph" class="hidden">
      <div class="row"><button onclick="doGraph()">Refresh</button></div>
      <div id="graph-canvas" class="card" style="padding:0;overflow:hidden"></div>
    </section>

    <section id="health" class="hidden">
      <div class="row"><button onclick="doHealth()">Refresh</button></div>
      <div id="health-results"></div>
    </section>

    <section id="system" class="hidden">
      <div class="row"><button onclick="doSystem()">Refresh</button></div>
      <div id="system-results"></div>
    </section>

    <section id="logs" class="hidden">
      <div class="row">
        <button onclick="doLogs()">Refresh</button>
        <button onclick="copyAllLogs()">Copy all</button>
        <label class="help" style="margin:0"><input type="checkbox" id="logs-auto" onchange="toggleLogsAuto()" /> auto-refresh</label>
        <span id="logs-copied" class="help" style="margin:0"></span>
      </div>
      <div id="logs-results"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const esc = (s) => (s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    // scopeBadge marks a result's provenance: project-scoped hits are highlighted,
    // global ones muted, so project vs global is legible at a glance (#143).
    const scopeBadge = (scope) => scope
      ? `<span class="scope${scope === 'global' ? '' : ' project'}">${esc(scope)}</span>` : '';

    // Write capability + auth token. Writes (merge/retire/approve) are disabled
    // unless the server runs interactive with a token AND the operator pastes that
    // token here; it is kept in localStorage and sent as a Bearer header, never
    // embedded in the served page (#168).
    let CAPS = { writable: false };
    const authToken = () => localStorage.getItem('brainiac_token') || '';
    function saveToken() {
      localStorage.setItem('brainiac_token', $('auth-token').value.trim());
      updateAuthBar();
    }
    async function loadCapabilities() {
      try { const c = await getJSON('/api/capabilities'); CAPS.writable = !!c.writable; } catch { CAPS.writable = false; }
      updateAuthBar();
    }
    function updateAuthBar() {
      const bar = $('auth-bar'), st = $('auth-status');
      if (!CAPS.writable) { bar.classList.add('hidden'); return; }
      bar.classList.remove('hidden');
      st.textContent = authToken() ? 'token set — write actions enabled' : 'paste AUTH_TOKEN to enable write actions';
    }
    // writeGate returns a banner for action tabs when writes can't work, so buttons
    // don't silently fail; '' when writes are usable.
    function writeGate() {
      if (!CAPS.writable) return `<div class="help">Read-only mode — write actions are disabled. Set <code>clients.webui=interactive</code> and <code>AUTH_TOKEN</code> in the deployment to enable them.</div>`;
      if (!authToken()) return `<div class="help">Paste your <code>AUTH_TOKEN</code> in the field above to enable the buttons below.</div>`;
      return '';
    }

    document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      for (const s of ['search','recall','consolidate','proposals','graph','health','system','logs']) $(s).classList.toggle('hidden', s !== t.dataset.tab);
      if (t.dataset.tab === 'health') doHealth();
      if (t.dataset.tab === 'consolidate') doConsolidate();
      if (t.dataset.tab === 'proposals') doProposals();
      if (t.dataset.tab === 'graph') doGraph();
      if (t.dataset.tab === 'system') doSystem();
      if (t.dataset.tab === 'logs') doLogs();
    });

    async function getJSON(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error((await r.json()).error || r.statusText);
      return r.json();
    }

    async function doSearch() {
      const q = $('search-q').value.trim(); if (!q) return;
      const box = $('search-results'); box.innerHTML = '<div class="empty">searching…</div>';
      try {
        const hits = await getJSON('/api/search?q=' + encodeURIComponent(q) + '&k=10');
        box.innerHTML = (hits && hits.length) ? hits.map(h =>
          `<div class="card"><div class="meta"><span class="dist">${h.distance.toFixed(3)}</span> ${scopeBadge(h.scope)} · ${esc(h.source_uri)}</div>${esc(h.text)}</div>`
        ).join('') : '<div class="empty">no results</div>';
      } catch (e) { box.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
    }

    async function doRecall() {
      const q = $('recall-q').value.trim(); if (!q) return;
      const box = $('recall-results'); box.innerHTML = '<div class="empty">recalling…</div>';
      try {
        const r = await getJSON('/api/recall?q=' + encodeURIComponent(q));
        const nodes = (r.Nodes || []).map(n => {
          const type = n.type ? ` <span class="meta">[${esc(n.type)}]</span>` : '';
          const aka = (n.aliases && n.aliases.length) ? ` <span class="meta">(aka: ${esc(n.aliases.join(', '))})</span>` : '';
          return `<div class="edge"><span class="name">${esc(n.canonical_name)}</span>${type}${aka}</div>`;
        }).join('') || '<div class="empty">no entities</div>';
        const edges = (r.Edges || []).map(e =>
          `<div class="edge"><span class="name">${esc(e.FromName)}</span> —${esc(e.Edge.type)}→ <span class="name">${esc(e.ToName)}</span>` +
          (e.Edge.why ? ` <span class="meta">(${esc(e.Edge.why)})</span>` : '') +
          (e.Edge.source_uri ? ` <span class="meta">[${esc(e.Edge.source_uri)}]</span>` : '') + `</div>`
        ).join('') || '<div class="empty">no edges</div>';
        const chunks = (r.Chunks || []).map(h =>
          `<div class="card"><div class="meta"><span class="dist">${h.distance.toFixed(3)}</span> ${scopeBadge(h.scope)} · ${esc(h.source_uri)}</div>${esc(h.text)}</div>`
        ).join('');
        const fallback = r.scope_fallback
          ? `<div class="fallback">No results in ${esc(r.scope)} — showing global memory.</div>` : '';
        box.innerHTML = fallback +
          `<div class="card"><div class="meta">entities</div>${nodes}</div>` +
          `<div class="card"><div class="meta">relationships</div>${edges}</div>` + chunks;
      } catch (e) { box.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
    }

    async function doHealth() {
      const box = $('health-results'); box.innerHTML = '<div class="empty">loading…</div>';
      try {
        const m = await getJSON('/api/health');
        const rows = [
          ['chunks (hot)', m.chunks_hot], ['chunks (cold)', m.chunks_cold],
          ['nodes', m.nodes], ['nodes (historical)', m.nodes_historical],
          ['edges', m.edges], ['edges (historical)', m.edges_historical],
          ['edges / node', (m.edges_per_node || 0).toFixed(2)],
          ['% historical', (m.percent_nodes_historical || 0).toFixed(1) + '%'],
        ];
        box.innerHTML = '<div class="card"><table>' +
          rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('') + '</table></div>';
      } catch (e) { box.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
    }

    // Human-readable bytes and duration for the System tab.
    const fmtBytes = (n) => {
      if (n == null) return '—'; if (n === 0) return '0 B';
      const u = ['B','KB','MB','GB','TB']; const i = Math.floor(Math.log(n) / Math.log(1024));
      return (n / Math.pow(1024, i)).toFixed(i ? 1 : 0) + ' ' + u[i];
    };
    const fmtDur = (s) => {
      s = Math.floor(s || 0); const d = Math.floor(s/86400), h = Math.floor(s%86400/3600), m = Math.floor(s%3600/60);
      if (d) return `${d}d ${h}h`; if (h) return `${h}h ${m}m`; if (m) return `${m}m ${s%60}s`; return `${s}s`;
    };
    const usageBar = (pct) => {
      const p = Math.max(0, Math.min(100, pct || 0)); const cls = p >= 95 ? ' crit' : p >= 85 ? ' warn' : '';
      return `<div class="bar${cls}"><span style="width:${p.toFixed(1)}%"></span></div>`;
    };
    const tableCard = (rows) => '<div class="card"><table>' +
      rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('') + '</table></div>';

    async function doSystem() {
      const box = $('system-results'); box.innerHTML = '<div class="empty">loading…</div>';
      try {
        const m = await getJSON('/api/system');
        const warns = (m.warnings || []).length
          ? `<ul class="warns">${m.warnings.map(w => `<li>⚠ ${esc(w)}</li>`).join('')}</ul>` : '';
        const head = `<div class="card"><span class="pill ${esc(m.status)}">${esc(m.status)}</span>` +
          ` <span class="meta" style="margin-left:8px">uptime ${fmtDur(m.uptime_seconds)}</span>${warns}</div>`;

        const c = m.container || {};
        const mem = c.available
          ? tableCard([
              ['memory used', `${fmtBytes(c.mem_used_bytes)} / ${fmtBytes(c.mem_limit_bytes)} (${(c.used_percent||0).toFixed(0)}%)${usageBar(c.used_percent)}`],
            ])
          : '<div class="card"><span class="meta">No cgroup memory limit visible (unlimited, or a non-Linux host — e.g. local dev). Allocated-memory tracking is available inside the Docker deployment.</span></div>';

        const p = m.process || {};
        const proc = tableCard([
          ['heap in use', fmtBytes(p.heap_alloc_bytes)],
          ['heap reserved', fmtBytes(p.heap_sys_bytes)],
          ['goroutines', p.goroutines], ['GC cycles', p.num_gc], ['CPU cores', p.num_cpu],
        ]);

        const db = m.db || {}, pool = db.pool || {};
        const connPct = db.max_connections ? 100 * db.active_connections / db.max_connections : 0;
        const poolPct = pool.max ? 100 * pool.acquired / pool.max : 0;
        const dbCard = tableCard([
          ['database size', fmtBytes(db.database_size_bytes)],
          ['vector index (hot)', fmtBytes(db.vector_index_bytes)],
          ['connections', `${db.active_connections} / ${db.max_connections}${usageBar(connPct)}`],
          ['pool (acquired / size)', `${pool.acquired} / ${pool.max} · ${pool.idle} idle${usageBar(poolPct)}`],
        ]);

        box.innerHTML = head +
          `<h3>Container memory</h3>${mem}` +
          `<h3>Database</h3>${dbCard}` +
          `<h3>Process</h3>${proc}`;
      } catch (e) { box.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
    }

    async function post(url, body) {
      const headers = { 'Content-Type': 'application/json' };
      const tok = authToken();
      if (tok) headers['Authorization'] = 'Bearer ' + tok;
      const r = await fetch(url, { method: 'POST', headers, body: body ? JSON.stringify(body) : null });
      // Parse defensively: the response may be JSON (our API) or, on some errors,
      // non-JSON — never let r.json() throw a cryptic "invalid JSON" over the real
      // problem (#168).
      const text = await r.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { /* non-JSON body */ }
      if (!r.ok) {
        if (r.status === 401) throw new Error('unauthorized — paste the AUTH_TOKEN above (write actions need it)');
        throw new Error((data && data.error) || `${r.status} ${r.statusText}` || 'request failed');
      }
      return data || {};
    }

    async function doConsolidate() {
      const box = $('consolidate-results'); box.innerHTML = '<div class="empty">loading…</div>';
      try {
        const r = await getJSON('/api/consolidate');
        const groups = (r.merge_groups || []).map(g => {
          const keep = g[0];
          const names = g.map(n => esc(n.canonical_name)).join(' ↔ ');
          const btns = g.slice(1).map(n =>
            `<button onclick="mergeNodes('${keep.id}','${n.id}')">Merge « ${esc(n.canonical_name)} » into « ${esc(keep.canonical_name)} »</button>`
          ).join(' ');
          return `<div class="card"><div>${names}</div><div class="row" style="margin-top:8px">${btns}</div></div>`;
        }).join('') || '<div class="empty">no merge candidates</div>';

        const conflicts = (r.conflicts || []).map(c =>
          `<div class="edge"><span class="name">${esc(c.from)}</span> —${esc(c.type)}→ ${esc(c.to_a)} <span class="meta">vs</span> ${esc(c.to_b)}` +
          ` <button onclick="retireEdge('${c.edge_b}')">keep « ${esc(c.to_a)} »</button>` +
          ` <button onclick="retireEdge('${c.edge_a}')">keep « ${esc(c.to_b)} »</button></div>`
        ).join('') || '<div class="empty">no conflicts</div>';

        const splits = (r.splits || []).map(s =>
          `<div class="edge"><span class="name">${esc(s.node.canonical_name)}</span> — contradictory edges` +
          ` <span class="meta">(route with CLI: kb split)</span></div>`
        ).join('') || '<div class="empty">no split candidates</div>';

        const stale = (r.stale || []).map(e =>
          `<div class="edge">${esc(e.type)} <span class="meta">[${esc(e.source_uri || e.id)}]</span> <button onclick="confirmEdge('${e.id}')">Confirm</button></div>`
        ).join('') || '<div class="empty">no stale edges</div>';

        const rollups = (r.rollups || []).map(x => `${esc(x.name)} (${x.edge_count})`).join(', ') || '—';

        const help = {
          merge: 'Nodes that look like the same entity (same normalized name + scope). Merge duplicates; nothing is auto-applied.',
          conflicts: 'Two current edges disagree — same source and relationship, different target. Keep the correct one; the other is retired to history (still reachable via recall).',
          splits: 'One entity whose edges contradict — it may conflate two things (e.g. prod vs staging). Route them apart with the CLI: kb split.',
          stale: 'The source changed since this edge was last confirmed. Confirm if it still holds, or retire it.',
          rollups: 'Hub nodes with many edges — candidates for a "current state of X" summary over the detailed history.',
        };
        const h = (title, key) => `<h3>${title}</h3><div class="help">${help[key]}</div>`;
        box.innerHTML =
          writeGate() +
          h('Merge candidates', 'merge') + groups +
          h('Conflicts', 'conflicts') + `<div class="card">${conflicts}</div>` +
          h('Split candidates', 'splits') + `<div class="card">${splits}</div>` +
          h('Stale edges', 'stale') + `<div class="card">${stale}</div>` +
          h('Rollup candidates', 'rollups') + `<div class="card">${rollups}</div>`;
      } catch (e) { box.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
    }

    async function mergeNodes(keep, drop) {
      try { await post('/api/merge', { Keep: keep, Drop: drop }); doConsolidate(); }
      catch (e) { alert('merge failed: ' + e.message); }
    }
    async function confirmEdge(id) {
      try { await post('/api/edges/' + encodeURIComponent(id) + '/confirm'); doConsolidate(); }
      catch (e) { alert('confirm failed: ' + e.message); }
    }
    async function retireEdge(id) {
      try { await post('/api/edges/' + encodeURIComponent(id) + '/retire'); doConsolidate(); }
      catch (e) { alert('retire failed: ' + e.message); }
    }

    // Extraction proposals: nodes/edges the local-LLM extractor suggested,
    // awaiting approval before they become part of the memory.
    async function doProposals() {
      const box = $('proposals-results'); box.innerHTML = '<div class="empty">loading…</div>';
      try {
        const r = await getJSON('/api/proposals');
        const nodes = (r.nodes || []).map(n =>
          `<div class="edge"><span class="name">${esc(n.canonical_name)}</span>` +
          `${n.type ? ' <span class="meta">('+esc(n.type)+')</span>' : ''} ${scopeBadge(model_scope(n))}` +
          ` <button onclick="reviewProposal('nodes','${n.id}','approve')">Approve</button>` +
          ` <button onclick="reviewProposal('nodes','${n.id}','reject')">Reject</button></div>`
        ).join('') || '<div class="empty">no proposed nodes</div>';

        const edges = (r.edges || []).map(e =>
          `<div class="edge"><span class="name">${esc(e.from_name)}</span> —${esc(e.type)}→ ${esc(e.to_name)}` +
          `${e.why ? ' <span class="meta">'+esc(e.why)+'</span>' : ''}` +
          ` <button onclick="reviewProposal('edges','${e.id}','approve')">Approve</button>` +
          ` <button onclick="reviewProposal('edges','${e.id}','reject')">Reject</button></div>`
        ).join('') || '<div class="empty">no proposed edges</div>';

        const help = 'Nodes and edges the optional local-LLM extractor derived from ingested text. ' +
          'They are invisible to search/recall until approved. Approve to make them live, reject to retire them. ' +
          'Approving an edge also promotes its endpoints.';
        box.innerHTML = writeGate() + `<div class="help">${help}</div>` +
          `<h3>Proposed nodes</h3><div class="card">${nodes}</div>` +
          `<h3>Proposed edges</h3><div class="card">${edges}</div>`;
      } catch (e) { box.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
    }
    // model_scope renders a proposed node's scope badge when discriminators are present.
    function model_scope(n) {
      const d = n.discriminators;
      if (!d || !Object.keys(d).length) return 'global';
      if (Object.keys(d).length === 1 && d.project) return 'project:' + d.project;
      return Object.keys(d).sort().map(k => k + '=' + d[k]).join(';');
    }
    async function reviewProposal(kind, id, action) {
      try { await post('/api/proposals/' + kind + '/' + encodeURIComponent(id) + '/' + action); doProposals(); }
      catch (e) { alert(action + ' failed: ' + e.message); }
    }

    // --- Logs tab (#166): recent app + access logs with copy buttons. ---
    let logsLines = [];      // most recent fetch, for Copy all
    let logsAutoTimer = null;

    async function copyText(text, note) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
        }
        if (note) { const el = $('logs-copied'); el.textContent = note; setTimeout(() => { el.textContent = ''; }, 1500); }
      } catch (e) { alert('copy failed: ' + e.message); }
    }
    function copyLine(i) { copyText(logsLines[i] ?? '', 'copied line'); }
    function copyAllLogs() { copyText(logsLines.join('\n'), `copied ${logsLines.length} line(s)`); }

    async function doLogs() {
      const box = $('logs-results');
      try {
        const r = await getJSON('/api/logs?limit=1000');
        logsLines = r.lines || [];
        if (!logsLines.length) { box.innerHTML = '<div class="empty">no logs yet</div>'; return; }
        const rows = logsLines.map((line, i) =>
          `<div class="logline"><span class="lc" title="copy this line" onclick="copyLine(${i})">⧉</span>` +
          `<span class="ln">${i + 1}</span><span>${esc(line)}</span></div>`
        ).join('');
        box.innerHTML = `<div class="help">Application + access logs (newest last, secrets redacted). Hover a line to copy it, or “Copy all”.</div>` +
          `<div class="logs-box" id="logs-box">${rows}</div>`;
        const lb = $('logs-box'); if (lb) lb.scrollTop = lb.scrollHeight; // jump to newest
      } catch (e) { box.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`; }
    }

    function toggleLogsAuto() {
      if ($('logs-auto').checked) { logsAutoTimer = setInterval(doLogs, 3000); }
      else if (logsAutoTimer) { clearInterval(logsAutoTimer); logsAutoTimer = null; }
    }

    // Compact built-in force-directed layout (no external lib; see SYSTEM.md).
    async function doGraph() {
      const box = $('graph-canvas'); box.innerHTML = '<div class="empty" style="padding:12px">loading…</div>';
      let g;
      try { g = await getJSON('/api/graph?limit=200'); }
      catch (e) { box.innerHTML = `<div class="empty" style="padding:12px">error: ${esc(e.message)}</div>`; return; }
      const nodes = g.nodes || [], edges = g.edges || [];
      if (!nodes.length) { box.innerHTML = '<div class="empty" style="padding:12px">graph is empty</div>'; return; }

      const W = 880, H = 520, idx = {};
      nodes.forEach((n, i) => { idx[n.id] = i; n.x = W/2 + Math.cos(i) * 120 + (i%7)*5; n.y = H/2 + Math.sin(i) * 120 + (i%5)*5; n.vx = 0; n.vy = 0; });
      const links = edges.filter(e => idx[e.from] != null && idx[e.to] != null);

      for (let step = 0; step < 260; step++) {
        for (let i = 0; i < nodes.length; i++) for (let j = i+1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          let dx = a.x-b.x, dy = a.y-b.y, d2 = dx*dx+dy*dy || 0.01, f = 1400/d2, d = Math.sqrt(d2);
          dx/=d; dy/=d; a.vx += dx*f; a.vy += dy*f; b.vx -= dx*f; b.vy -= dy*f;
        }
        for (const e of links) {
          const a = nodes[idx[e.from]], b = nodes[idx[e.to]];
          let dx = b.x-a.x, dy = b.y-a.y, d = Math.sqrt(dx*dx+dy*dy) || 0.01, f = (d-90)*0.02;
          dx/=d; dy/=d; a.vx += dx*f; a.vy += dy*f; b.vx -= dx*f; b.vy -= dy*f;
        }
        for (const n of nodes) {
          n.vx += (W/2 - n.x)*0.002; n.vy += (H/2 - n.y)*0.002;
          n.x += Math.max(-8, Math.min(8, n.vx)); n.y += Math.max(-8, Math.min(8, n.vy));
          n.vx *= 0.85; n.vy *= 0.85;
          n.x = Math.max(20, Math.min(W-20, n.x)); n.y = Math.max(20, Math.min(H-20, n.y));
        }
      }

      const line = links.map(e => {
        const a = nodes[idx[e.from]], b = nodes[idx[e.to]];
        return `<line x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}" stroke="#3a4152" stroke-width="1"><title>${esc(e.type)}${e.why ? ': '+esc(e.why) : ''}</title></line>`;
      }).join('');
      const dot = nodes.map(n =>
        `<g><circle cx="${n.x.toFixed(1)}" cy="${n.y.toFixed(1)}" r="6" fill="#5b9dff"><title>${esc(n.name)}${n.type ? ' ('+esc(n.type)+')' : ''}</title></circle>` +
        `<text x="${(n.x+9).toFixed(1)}" y="${(n.y+4).toFixed(1)}" fill="#c9cdd8" font-size="11">${esc(n.name)}</text></g>`
      ).join('');
      box.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;background:#12141a">${line}${dot}</svg>`;
    }

    $('search-q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    $('recall-q').addEventListener('keydown', e => { if (e.key === 'Enter') doRecall(); });

    // Boot: restore a saved token and learn whether writes are enabled server-side.
    $('auth-token').value = authToken();
    $('auth-token').addEventListener('keydown', e => { if (e.key === 'Enter') saveToken(); });
    loadCapabilities();
  </script>
</body>
</html>
