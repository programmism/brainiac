# Brainiac configuration (SYSTEM.md §3, PRD §19).
# Copy to config.yaml and edit. Secrets (storage.dsn, connector tokens) are
# better set via environment variables — those always override this file:
#   DATABASE_URL  -> storage.dsn
#   OLLAMA_URL    -> embedding.base_url
#   HTTP_ADDR     -> http.addr

http:
  addr: ":8080"
  # rate_limit_rps: 5          # per-client /api req/s (#270); 0/omitted = off.
  #                            #   client = principal, else bearer token, else IP.
  # rate_limit_burst: 10       # token-bucket depth; 0 = ceil(rate_limit_rps)

storage:
  # Prefer DATABASE_URL over putting the DSN here.
  dsn: "postgres://brainiac:brainiac@localhost:5432/brainiac?sslmode=disable"

embedding:
  provider: ollama
  base_url: "http://localhost:11434"
  model: nomic-embed-text
  dims: 768
  batch_size: 32              # chunks per embed request on bulk ingest (#140); 0 = default
  # max_concurrency: 4        # cap in-flight embed round-trips to Ollama (#270); 0 = unlimited

extraction:
  default: chat-driven        # "chat-driven" (default): Claude supplies the graph via remember/link.
                              # "local-llm": opt-in Ollama chat model derives nodes/edges during ingest
                              # (needs a beefy box; a weak one keeps the free chat path). Env: EXTRACTOR.
  # model: llama3.1           # required when default is local-llm (env: EXTRACTION_MODEL)
  # base_url: ""              # extraction Ollama endpoint; empty = the embedding base_url (env: EXTRACTION_URL)
  # retries: 3                # transient-failure attempts per chunk
  review: true                # true (default): extracted rows go to the review queue (WebUI Proposals tab)
                              # as 'proposed', invisible until approved. false: write them live. Env: EXTRACTION_REVIEW.

consolidation:
  schedule: weekly
  merge: human-approved

sources:
  - type: notion
    selection: density-filter
    # token: secret_xxx        # prefer NOTION_TOKEN in the environment
  # - type: markdown           # kb import --source markdown [--path DIR]
  #   selection: density-filter
  #   path: ./docs
  # - type: git               # added when the 2nd domain is real
  #   selection: code-aware

clients:
  mcp: true
  webui: read-only            # -> interactive later
  cli: true

# principals — OPT-IN Layer 2 hard isolation (#120). Omit for Layer 1 (open
# reads, single AUTH_TOKEN gates writes) — the default. When present, ONE server
# serves many namespaces: every /api call needs a principal's bearer token, reads
# are walled to its `read` namespaces, and writes are pinned to its single `write`
# namespace. A namespace is a `project` value; "global" (or "") is shared data,
# visible only to a principal that lists it in `read`.
# Token lifecycle (#269): generate tokens with `brainiac token gen` (≥ 32 chars).
# Prefer hash-at-rest — `brainiac token gen | brainiac token hash` → put the hash
# in `token_sha256:` and give the plaintext to the client, so config holds no live
# secret. Set `expires:` (RFC3339) for an automatic cutoff, `revoked: true` to
# disable. To apply a revocation/rotation without a restart, edit this file and run
# `docker compose kill -s HUP app` (the HTTP server hot-swaps the roster).
# principals:
#   - name: team-a
#     read:  [team-a]           # namespaces this token may read
#     write: team-a             # single namespace its writes are pinned to
#     max_nodes: 10000          # per-namespace row caps (#186); 0/omitted = unlimited
#     max_chunks: 50000
#     # token: secret           # prefer PRINCIPAL_TOKEN_TEAM_A in the environment
#     # token_sha256: <hex>     # hash-at-rest alternative to token (no plaintext at rest)
#     # expires: 2026-12-31T00:00:00Z   # optional per-token expiry (RFC3339)
#     # revoked: true           # hard-disable this token
#   - name: platform
#     read:  [team-a, team-b, global]   # an operator that reads several + global
#     write: platform
