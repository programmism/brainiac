name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brainiac_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Available to DB-backed tests as they land (#4, #8). Ollama-dependent
      # tests skip when OLLAMA_URL is unset.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/brainiac_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        run: go build ./...
      - name: test
        # -p 1 serializes packages: the DB-backed tests share one Postgres and
        # TRUNCATE, so they must not run concurrently.
        run: go test -race -count=1 -p 1 ./...

  smoke:
    name: smoke (docker compose deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image and start db + app
        run: |
          cp .env.example .env
          docker compose up -d --build db app
      - name: Wait for /readyz and verify the DB is healthy
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /tmp/readyz.json -w '%{http_code}' http://localhost:8080/readyz || true)
            echo "attempt $i: HTTP $code $(cat /tmp/readyz.json 2>/dev/null)"
            if [ "$code" = "200" ]; then
              grep -q '"db":"ok"' /tmp/readyz.json && { echo "app ready, migrations applied, db ok"; exit 0; }
            fi
            sleep 3
          done
          echo "::error::app did not become ready"; docker compose logs; exit 1
      - name: Teardown
        if: always()
        run: docker compose down -v

  caddy:
    name: caddy (validate reverse proxy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Caddyfile
        run: |
          HASH=$(docker run --rm caddy:2 caddy hash-password --plaintext test)
          docker run --rm \
            -e SITE_ADDRESS=:80 -e BASIC_AUTH_USER=admin -e BASIC_AUTH_HASH="$HASH" \
            -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2 caddy validate --adapter caddyfile --config /etc/caddy/Caddyfile
