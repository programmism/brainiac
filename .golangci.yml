# golangci-lint v2 configuration. See SYSTEM.md §3.
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    errcheck:
      # Writes to stdout/stderr in CLI output — the error is not actionable.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gofmt
