# Brainiac — one-command deploy (SYSTEM.md §4).
#   cp .env.example .env && docker compose up
# Brings up Postgres+pgvector, Ollama (with the embedding model pulled once),
# and the app (which auto-migrates on boot and health-probes itself).
#
# Resource limits target the 4 GB prototype box (SYSTEM.md §9/§12); raise them
# on bigger hardware. Log rotation caps disk use.

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brainiac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brainiac}
      POSTGRES_DB: ${POSTGRES_DB:-brainiac}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brainiac} -d ${POSTGRES_DB:-brainiac}"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 768m
    cpus: 1.0
    logging: *logging
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    # Sized for the default embedder (nomic-embed-text, ~1.5 GB peak). If you turn
    # on the optional local-LLM extractor (EXTRACTOR=local-llm), it loads a chat
    # model into this same Ollama — raise this to fit it (a beefy box, per README).
    mem_limit: 1536m
    cpus: 2.0
    logging: *logging
    restart: unless-stopped

  # One-shot: pull the embedding model, then exit. Idempotent.
  ollama-pull:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull ${EMBEDDING_MODEL:-nomic-embed-text}"]
    logging: *logging
    # Retry a transient pull failure instead of leaving the model permanently
    # un-pulled after one network blip (#250).
    restart: on-failure

  app:
    # Pulls a prebuilt multi-arch image from GHCR (#248) — no compile on the target
    # box. Pin a version with BRAINIAC_VERSION; default tracks the latest release.
    # For local development / CI, layer docker-compose.dev.yml to build from source.
    image: ghcr.io/programmism/brainiac:${BRAINIAC_VERSION:-latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Env always wins over config.yaml (see internal/config).
      DATABASE_URL: postgres://${POSTGRES_USER:-brainiac}:${POSTGRES_PASSWORD:-brainiac}@db:5432/${POSTGRES_DB:-brainiac}?sslmode=disable
      OLLAMA_URL: http://ollama:11434
      HTTP_ADDR: ":8080"
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      # WebUI write actions (merge/retire/approve) are off until this is
      # "interactive" AND AUTH_TOKEN is set (secure by default).
      WEBUI_MODE: ${WEBUI_MODE:-}
      NOTION_TOKEN: ${NOTION_TOKEN:-}
      INGEST_INTERVAL: ${INGEST_INTERVAL:-}
      # Optional local-LLM extractor (off unless EXTRACTOR=local-llm). URL defaults
      # to the embedding Ollama above when unset.
      EXTRACTOR: ${EXTRACTOR:-}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-}
      EXTRACTION_URL: ${EXTRACTION_URL:-}
      EXTRACTION_REVIEW: ${EXTRACTION_REVIEW:-}
    volumes:
      # Drop docs here for `docker compose exec app /kb import --source markdown --path /data/docs`.
      - ./data:/data:ro
    # Host-localhost only by default (not the LAN). Production exposes the app
    # solely through Caddy (proxy profile); reach it from the host or via SSH
    # tunnel for dev. The MCP server does not use this port.
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "/brainiac", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    cpus: 1.0
    logging: *logging
    restart: unless-stopped

  # Reverse proxy + auth + TLS. Enable with: docker compose --profile proxy up
  # In production, drop the app's host port mapping above so only Caddy is exposed.
  caddy:
    image: caddy:2
    profiles: ["proxy"]
    depends_on:
      - app
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 96m
    logging: *logging
    restart: unless-stopped

  # Scheduled daily backups. Enable with: docker compose --profile backup up -d
  # Writes gzipped pg_dumps to ./backups and keeps the newest 14.
  # On by default: a company memory should never boot without backups. The daily
  # dump covers graph + vectors + provenance in one consistent file (#257). Point
  # ./backups at off-box storage for real durability. To run without it, start the
  # other services explicitly (e.g. `docker compose up db app`).
  backup:
    image: pgvector/pgvector:pg16
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-brainiac}
    volumes:
      - ./backups:/backups
    entrypoint:
      - /bin/sh
      - -c
      - >
        while true; do
          ts=$$(date -u +%Y%m%dT%H%M%SZ);
          pg_dump -h db -U ${POSTGRES_USER:-brainiac} -d ${POSTGRES_DB:-brainiac} --clean --if-exists | gzip > /backups/brainiac-$$ts.sql.gz
          && echo "backup: wrote brainiac-$$ts.sql.gz";
          ls -1t /backups/brainiac-*.sql.gz | tail -n +15 | xargs -r rm -f;
          sleep 86400;
        done
    healthcheck:
      # Healthy once a recent dump exists (the loop writes one immediately on boot).
      test: ["CMD-SHELL", "test -n \"$$(find /backups -name 'brainiac-*.sql.gz' -mmin -1500)\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    mem_limit: 128m
    logging: *logging
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
  caddy_data:
  caddy_config:
